<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문제의 벽 — Connect & Grow</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
html,body { width:100%; height:100%; overflow:hidden; background:#e8e8e8; font-family:"Segoe UI","Malgun Gothic",sans-serif; }
header { display:flex; align-items:center; justify-content:space-between; padding:6px 16px; background:#1e1b2e; height:44px; gap:8px; flex-shrink:0; }
.logo { font-size:1rem; font-weight:800; color:#a78bfa; }
.badge { background:#2d1f5e; color:#c4b5fd; border:1px solid #4c35a0; border-radius:20px; padding:2px 10px; font-size:.7rem; font-weight:600; }
.page-badge { background:#3d2a7a; color:#e9d5ff; border:1px solid #6d28d9; border-radius:20px; padding:2px 10px; font-size:.7rem; font-weight:700; min-width:80px; text-align:center; }
.header-left { display:flex; align-items:center; gap:10px; }
.header-right { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.timer-box { background:#2a1a4a; border:1px solid #6d28d9; border-radius:6px; padding:4px 10px; font-size:.75rem; color:#c4b5fd; display:flex; align-items:center; gap:6px; }
.timer-count { font-size:1rem; font-weight:800; color:#a78bfa; min-width:26px; text-align:center; }
.btn { padding:4px 12px; border-radius:6px; border:none; font-size:.72rem; font-weight:700; cursor:pointer; transition:opacity .15s; }
.btn:hover { opacity:.85; }
.btn-primary { background:#7c3aed; color:#fff; }
.btn-secondary { background:#2d1f5e; color:#c4b5fd; border:1px solid #4c35a0; }
.btn-danger { background:#991b1b; color:#fff; }
.btn-page { background:#1e3a5f; color:#93c5fd; border:1px solid #3b82f6; }
.btn-share { background:#0f766e; color:#99f6e4; border:1px solid #14b8a6; }
.upload-label { padding:4px 12px; border-radius:6px; background:#065f46; color:#6ee7b7; border:1px solid #059669; font-size:.72rem; font-weight:700; cursor:pointer; }
#fileInput { display:none; }
#sharePanel { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#1e1b2e; border:1px solid #4c35a0; border-radius:12px; padding:20px 24px; z-index:500; min-width:320px; max-width:500px; width:90%; box-shadow:0 8px 32px rgba(0,0,0,.5); }
#sharePanel h3 { color:#a78bfa; font-size:.95rem; margin-bottom:12px; }
#sharePanel p { color:#9ca3af; font-size:.75rem; margin-bottom:8px; }
#shareUrl { width:100%; background:#0d0a1f; border:1px solid #4c35a0; color:#c4b5fd; border-radius:6px; padding:8px 10px; font-size:.75rem; font-family:"Consolas",monospace; resize:none; height:60px; margin-bottom:10px; }
.share-btns { display:flex; gap:8px; }
#shareOverlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:499; }
#uploadGuide { display:flex; flex-direction:column; align-items:center; justify-content:center; height:calc(100vh - 44px); gap:14px; color:#555; }
#uploadGuide .icon { font-size:3.5rem; }
#uploadGuide h2 { font-size:1.2rem; }
#uploadGuide p { font-size:.85rem; text-align:center; color:#777; }
#wall { display:none; width:100%; height:calc(100vh - 44px); padding:5px; }
.card-grid { display:grid; width:100%; height:100%; gap:4px; }
.card { background:#fff; border-radius:8px; overflow:hidden; display:flex; flex-direction:column; border:1px solid #ccc; box-shadow:0 1px 4px rgba(0,0,0,.12); transition:opacity .4s,transform .4s; }
.card.shuffling { opacity:0; transform:scale(.88); }
.card-bar { height:6px; flex-shrink:0; }
.card-inner { flex:1; padding:4px 6px 3px; display:flex; flex-direction:column; gap:0; min-height:0; overflow:hidden; }
.card-top { display:flex; align-items:center; justify-content:space-between; gap:3px; flex-shrink:0; margin-bottom:2px; }
.card-badge { font-size:.42rem; font-weight:800; padding:1px 3px; border-radius:5px; color:#fff; white-space:pre; line-height:1.1; flex-shrink:0; }
.card-id { font-size:.65rem; font-weight:900; color:#222; font-family:"Consolas",monospace; flex-shrink:0; }
.card-divider { height:1px; background:#e5e7eb; flex-shrink:0; margin-bottom:2px; }
.card-q { flex:1; overflow:hidden; color:#1a1a1a; }
.c0{background:#2563eb;} .c1{background:#d97706;} .c2{background:#059669;}
.c3{background:#7c3aed;} .c4{background:#dc2626;} .c5{background:#db2777;} .c6{background:#0891b2;}
@keyframes fadeIn { from{opacity:0;transform:scale(.92);} to{opacity:1;transform:scale(1);} }
.card.appear { animation:fadeIn .3s ease forwards; }
@keyframes slideIn { from{opacity:0;transform:translateX(20px);} to{opacity:1;transform:translateX(0);} }
.card.slide { animation:slideIn .35s ease forwards; }
.progress-bar { position:fixed; bottom:0; left:0; height:3px; background:#7c3aed; transition:width 1s linear; z-index:200; }
.toast { position:fixed; bottom:14px; left:50%; transform:translateX(-50%) translateY(60px); background:#4c1d95; color:#ede9fe; padding:8px 20px; border-radius:20px; font-size:.82rem; font-weight:700; border:1px solid #7c3aed; transition:transform .3s; z-index:300; white-space:nowrap; }
.toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<header>
  <div class="header-left">
    <div class="logo">🗺 문제의 벽</div>
    <div class="badge" id="countBadge">0문항</div>
    <div class="page-badge" id="pageBadge" style="display:none">1 / 3 페이지</div>
  </div>
  <div class="header-right">
    <label class="upload-label" for="fileInput">📂 엑셀 업로드</label>
    <input type="file" id="fileInput" accept=".xlsx,.xls">
    <div class="timer-box">🔀 <span class="timer-count" id="timerCount">30</span>초</div>
    <button class="btn btn-primary" id="btnShuffle" style="display:none">지금 셔플</button>
    <button class="btn btn-secondary" id="btnToggleTimer" style="display:none">타이머 정지</button>
    <button class="btn btn-page" id="btnNextPage" style="display:none">▶ 다음 페이지</button>
    <button class="btn btn-share" id="btnShare" style="display:none">🔗 링크 공유</button>
  </div>
</header>
<div id="uploadGuide">
  <div class="icon">📋</div>
  <h2>엑셀 파일을 업로드하세요</h2>
  <p>문제가 3페이지로 나뉘어 표시되고<br>30초마다 자동으로 페이지 전환됩니다</p>
  <label class="upload-label" for="fileInput" style="font-size:.9rem;padding:10px 24px;margin-top:8px">📂 엑셀 파일 선택</label>
</div>
<div id="wall"><div class="card-grid" id="cardGrid"></div></div>
<div class="progress-bar" id="progressBar" style="width:100%"></div>
<div class="toast" id="toast"></div>
<div id="shareOverlay"></div>
<div id="sharePanel">
  <h3>🔗 링크로 공유하기</h3>
  <p>아래 링크를 복사해서 다른 컴퓨터 브라우저에 붙여넣으세요.</p>
  <textarea id="shareUrl" readonly></textarea>
  <div class="share-btns">
    <button class="btn btn-primary" id="btnCopyUrl">📋 링크 복사</button>
    <button class="btn btn-secondary" id="btnCloseShare">닫기</button>
  </div>
</div>
<script>
var allQ = [], pages = [], curPage = 0;
var timerInt = null, running = false, secs = 30, INTERVAL = 30;
var AREAS = ["공감력","표현력","업무이해력","협업역량","자기주도력","핵심가치이해력","학사이해력"];
var TOTAL_PAGES = 3;

// ── URL 공유 ──
function loadFromUrl() {
  if (!location.hash || location.hash.length < 2) return false;
  try {
    var data = JSON.parse(decodeURIComponent(atob(location.hash.slice(1))));
    if (!Array.isArray(data) || !data.length) return false;
    allQ = data;
    init(); return true;
  } catch(e) { return false; }
}
function makeShareUrl() {
  return location.href.split("#")[0] + "#" + btoa(encodeURIComponent(JSON.stringify(allQ)));
}
document.getElementById("btnShare").addEventListener("click", function() {
  document.getElementById("shareUrl").value = makeShareUrl();
  document.getElementById("sharePanel").style.display = "block";
  document.getElementById("shareOverlay").style.display = "block";
});
document.getElementById("btnCopyUrl").addEventListener("click", function() {
  document.getElementById("shareUrl").select(); document.execCommand("copy");
  this.textContent = "✅ 복사됨!";
  var b = this; setTimeout(function(){ b.textContent = "📋 링크 복사"; }, 1500);
});
document.getElementById("btnCloseShare").addEventListener("click", closeShare);
document.getElementById("shareOverlay").addEventListener("click", closeShare);
function closeShare() {
  document.getElementById("sharePanel").style.display = "none";
  document.getElementById("shareOverlay").style.display = "none";
}

// ── 파일 업로드 ──
document.getElementById("fileInput").addEventListener("change", function(e) {
  var file = e.target.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    var wb = XLSX.read(ev.target.result, {type:"binary"});
    var ws = wb.Sheets[wb.SheetNames[0]];
    var rows = XLSX.utils.sheet_to_json(ws, {header:1});
    allQ = [];
    for (var i = 1; i < rows.length; i++) {
      var r = rows[i]; if (!r[0] || !r[1]) continue;
      allQ.push({id:String(r[0]), text:String(r[1]), area:String(r[4]||"")});
    }
    location.hash = btoa(encodeURIComponent(JSON.stringify(allQ)));
    init();
  };
  reader.readAsBinaryString(file);
});

function init() {
  document.getElementById("countBadge").textContent = allQ.length + "문항";
  splitPages();
  renderPage(0, false);
  showWall();
  startTimer();
}

// ── 텍스트 처리 ──
function getLines(text) {
  // 줄바꿈 있으면 그대로, 없으면 객관식 분리
  var raw = text.split("\n").map(function(l){ return l.trim(); }).filter(function(l){ return l; });
  if (raw.length === 1) {
    var s = text.replace(/\s+([A-D][.:]\s)/g, "\n$1").replace(/([^\n])([A-D][.:]\s)/g, "$1\n$2").trim();
    raw = s.split("\n").map(function(l){ return l.trim(); }).filter(function(l){ return l; });
  }
  return raw;
}

// ── 카드 HTML 생성 ──
function makeCardBody(lines) {
  // 객관식 감지
  var optIdx = -1;
  for (var i = 0; i < lines.length; i++) {
    if (/^[A-D][.:]\s/.test(lines[i])) { optIdx = i; break; }
  }

  if (optIdx > 0) {
    var qLines = lines.slice(0, optIdx);
    var opts = lines.slice(optIdx);
    var maxQ = 0;
    for (var i = 0; i < qLines.length; i++) if (qLines[i].length > maxQ) maxQ = qLines[i].length;
    var maxO = 0;
    for (var i = 0; i < opts.length; i++) if (opts[i].length > maxO) maxO = opts[i].length;

    var qFs = maxQ <= 15 ? 13 : maxQ <= 25 ? 12 : maxQ <= 40 ? 11 : 10;
    var oFs = maxO <= 12 ? 11 : maxO <= 18 ? 10 : maxO <= 24 ? 9 : maxO <= 30 ? 8 : 7;

    var tbl = '<table style="width:100%;border-collapse:collapse;margin-top:1px">';
    for (var i = 0; i < opts.length; i += 2) {
      tbl += '<tr>';
      tbl += '<td style="width:50%;font-size:'+oFs+'px;line-height:1.2;padding:0 2px 1px 0;vertical-align:top;word-break:keep-all">'+(opts[i]||'')+'</td>';
      tbl += '<td style="width:50%;font-size:'+oFs+'px;line-height:1.2;padding:0 0 1px 2px;vertical-align:top;word-break:keep-all">'+(opts[i+1]||'')+'</td>';
      tbl += '</tr>';
    }
    tbl += '</table>';
    return '<div style="font-size:'+qFs+'px;line-height:1.3;word-break:keep-all">'+qLines.join('<br>')+'</div>'+tbl;
  } else {
    var maxL = 0;
    for (var i = 0; i < lines.length; i++) if (lines[i].length > maxL) maxL = lines[i].length;
    var fs = maxL <= 20 ? 13 : maxL <= 35 ? 12 : maxL <= 55 ? 11 : maxL <= 75 ? 10 : 9;
    return '<div style="font-size:'+fs+'px;line-height:1.3;word-break:keep-all">'+lines.join('<br>')+'</div>';
  }
}

// ── 셔플 & 페이지 분할 ──
function doShuffle(a) {
  var b = a.slice();
  for (var i = b.length-1; i > 0; i--) {
    var j = Math.floor(Math.random()*(i+1));
    var t = b[i]; b[i] = b[j]; b[j] = t;
  }
  return b;
}
function splitPages() {
  var sh = doShuffle(allQ);
  var n = allQ.length;
  var perPage = Math.ceil(n / TOTAL_PAGES);
  pages = [];
  for (var p = 0; p < TOTAL_PAGES; p++) {
    pages.push(sh.slice(p * perPage, (p+1) * perPage));
  }
}

// ── 그리드 계산 ──
function calcGrid(n) {
  var W = window.innerWidth - 10;
  var H = window.innerHeight - 44 - 10;
  var bestCols = 1, bestScore = 999;
  for (var c = 1; c <= n; c++) {
    var r = Math.ceil(n / c);
    var cW = W / c, cH = H / r;
    var score = Math.abs(cW/cH - 1.7);
    if (score < bestScore) { bestScore = score; bestCols = c; }
  }
  return { cols: bestCols, rows: Math.ceil(n / bestCols) };
}

// ── 렌더링 ──
function drawCards(grid, questions, animClass) {
  var n = questions.length;
  var g = calcGrid(n);
  var cols = g.cols, rows = g.rows;
  grid.style.gridTemplateColumns = "repeat("+cols+",1fr)";
  grid.style.gridTemplateRows = "repeat("+rows+",1fr)";
  grid.innerHTML = "";
  var frag = document.createDocumentFragment();
  for (var i = 0; i < questions.length; i++) {
    var q = questions[i];
    var lines = getLines(q.text);
    var ci = AREAS.indexOf(q.area); if (ci < 0) ci = 0;
    var areaLabel = q.area === "핵심가치이해력" ? "핵심가치\n이해력" : q.area;
    var card = document.createElement("div");
    card.className = "card " + animClass;
    card.style.animationDelay = Math.min(i*0.004, 0.15) + "s";
    card.innerHTML =
      '<div class="card-bar c'+ci+'"></div>'+
      '<div class="card-inner">'+
        '<div class="card-top">'+
          '<div class="card-badge c'+ci+'">'+areaLabel+'</div>'+
          '<div class="card-id">'+q.id+'</div>'+
        '</div>'+
        '<div class="card-divider"></div>'+
        '<div class="card-q">'+makeCardBody(lines)+'</div>'+
      '</div>';
    frag.appendChild(card);
  }
  grid.appendChild(frag);
}

function renderPage(pg, animClass) {
  curPage = pg;
  var grid = document.getElementById("cardGrid");
  var questions = pages[pg] || [];
  document.getElementById("pageBadge").textContent = (pg+1) + " / " + TOTAL_PAGES + " 페이지";
  drawCards(grid, questions, animClass || "appear");
}

function showWall() {
  document.getElementById("uploadGuide").style.display = "none";
  document.getElementById("wall").style.display = "block";
  document.getElementById("pageBadge").style.display = "inline-block";
  document.getElementById("btnShuffle").style.display = "inline-block";
  document.getElementById("btnToggleTimer").style.display = "inline-block";
  document.getElementById("btnNextPage").style.display = "inline-block";
  document.getElementById("btnShare").style.display = "inline-block";
}

// ── 타이머 ──
function startTimer() {
  if (timerInt) clearInterval(timerInt);
  secs = INTERVAL; running = true; updUI(); updBar();
  timerInt = setInterval(function(){
    if (!running) return;
    secs--; updUI(); updBar();
    if (secs <= 0) { go(); secs = INTERVAL; }
  }, 1000);
  document.getElementById("btnToggleTimer").textContent = "타이머 정지";
}
function updUI() { document.getElementById("timerCount").textContent = secs; }
function updBar() { document.getElementById("progressBar").style.width = (secs/INTERVAL*100)+"%"; }

function go() {
  var next = (curPage + 1) % TOTAL_PAGES;
  var t = document.getElementById("toast");
  if (next === 0) {
    // 3페이지 다 돌고 나서 재셔플 후 1페이지
    splitPages();
    t.textContent = "🔀 재셔플! 1페이지";
  } else {
    t.textContent = "▶ " + (next+1) + "페이지";
  }
  t.classList.add("show");
  setTimeout(function(){ t.classList.remove("show"); }, 1800);
  renderPage(next, "slide");
}

document.getElementById("btnNextPage").addEventListener("click", function(){
  var next = (curPage + 1) % TOTAL_PAGES;
  if (next === 0) splitPages();
  renderPage(next, "slide");
  secs = INTERVAL; updBar();
  var t = document.getElementById("toast");
  t.textContent = next === 0 ? "🔀 재셔플! 1페이지" : "▶ " + (next+1) + "페이지";
  t.classList.add("show");
  setTimeout(function(){ t.classList.remove("show"); }, 1800);
});
document.getElementById("btnShuffle").addEventListener("click", function(){
  splitPages(); renderPage(0, "appear"); secs = INTERVAL; updBar();
});
document.getElementById("btnToggleTimer").addEventListener("click", function(){
  running = !running;
  this.textContent = running ? "타이머 정지" : "타이머 재개";
  this.className = "btn " + (running ? "btn-secondary" : "btn-danger");
});
window.addEventListener("resize", function(){ if (allQ.length) renderPage(curPage, "appear"); });
window.addEventListener("load", function(){ loadFromUrl(); });
</script>
</body>
</html>
