<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정답의 벽 — Connect & Grow</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
html,body { width:100%; height:100%; overflow:hidden; background:#e8e8e8; font-family:"Segoe UI","Malgun Gothic",sans-serif; color:#111; }
header { display:flex; align-items:center; justify-content:space-between; padding:6px 16px; background:#0f2417; height:44px; gap:8px; flex-shrink:0; }
.logo { font-size:1rem; font-weight:800; color:#34d399; }
.badge { background:#064e3b; color:#6ee7b7; border:1px solid #059669; border-radius:20px; padding:2px 10px; font-size:0.7rem; font-weight:600; }
.header-left { display:flex; align-items:center; gap:10px; }
.header-right { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.timer-box { background:#052e16; border:1px solid #059669; border-radius:6px; padding:4px 10px; font-size:0.75rem; color:#6ee7b7; display:flex; align-items:center; gap:6px; }
.timer-count { font-size:1rem; font-weight:800; color:#34d399; min-width:26px; text-align:center; }
.btn { padding:4px 12px; border-radius:6px; border:none; font-size:0.72rem; font-weight:700; cursor:pointer; transition:opacity .15s; }
.btn:hover { opacity:.85; }
.btn-primary { background:#059669; color:#fff; }
.btn-secondary { background:#064e3b; color:#6ee7b7; border:1px solid #059669; }
.btn-danger { background:#991b1b; color:#fff; }
.btn-share { background:#1e3a5f; color:#93c5fd; border:1px solid #1d4ed8; }
.upload-label { padding:4px 12px; border-radius:6px; background:#1e3a5f; color:#93c5fd; border:1px solid #1d4ed8; font-size:0.72rem; font-weight:700; cursor:pointer; }
#fileInput { display:none; }

/* 공유 패널 */
#sharePanel {
  display:none; position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%);
  background:#0f2417; border:1px solid #059669;
  border-radius:12px; padding:20px 24px; z-index:500;
  min-width:320px; max-width:500px; width:90%;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
}
#sharePanel h3 { color:#34d399; font-size:0.95rem; margin-bottom:12px; }
#sharePanel p { color:#9ca3af; font-size:0.75rem; margin-bottom:8px; }
#shareUrl { width:100%; background:#052e16; border:1px solid #059669; color:#6ee7b7; border-radius:6px; padding:8px 10px; font-size:0.75rem; font-family:"Consolas",monospace; resize:none; height:60px; margin-bottom:10px; }
.share-btns { display:flex; gap:8px; }
#shareOverlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:499; }

#uploadGuide { display:flex; flex-direction:column; align-items:center; justify-content:center; height:calc(100vh - 44px); gap:14px; color:#555; }
#uploadGuide .icon { font-size:3.5rem; }
#uploadGuide h2 { font-size:1.2rem; }
#uploadGuide p { font-size:0.85rem; text-align:center; color:#777; }
#wall { display:none; width:100%; height:calc(100vh - 44px); padding:5px; }
.card-grid { display:grid; width:100%; height:100%; gap:4px; }

/* 카드 — 정답 + 코드만 */
.card { background:#fff; border-radius:6px; overflow:hidden; display:flex; flex-direction:column; border:1px solid #ccc; box-shadow:0 1px 3px rgba(0,0,0,.12); transition:opacity .4s,transform .4s; }
.card.shuffling { opacity:0; transform:scale(.88); }
.card-bar { height:5px; flex-shrink:0; width:100%; }
.card-inner { flex:1; padding:4px 6px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; min-height:0; overflow:hidden; }

/* 정답 텍스트 */
.card-answer { font-weight:800; color:#111; text-align:center; line-height:1.35; word-break:keep-all; width:100%; }

.card-divider { height:1px; background:#e5e7eb; flex-shrink:0; width:80%; }

/* 코드 — 크고 굵게 */
.card-code { font-weight:900; color:#059669; font-family:"Consolas",monospace; letter-spacing:0.12em; text-align:center; flex-shrink:0; }

/* 영역 색상 바 */
.c0{background:#2563eb;} .c1{background:#d97706;} .c2{background:#059669;}
.c3{background:#7c3aed;} .c4{background:#dc2626;} .c5{background:#db2777;} .c6{background:#0891b2;}

@keyframes fadeIn { from{opacity:0;transform:scale(.9);} to{opacity:1;transform:scale(1);} }
.card.appear { animation:fadeIn .3s ease forwards; }
.progress-bar { position:fixed; bottom:0; left:0; height:3px; background:#059669; transition:width 1s linear; z-index:200; }
.toast { position:fixed; bottom:14px; left:50%; transform:translateX(-50%) translateY(60px); background:#064e3b; color:#6ee7b7; padding:8px 20px; border-radius:20px; font-size:.82rem; font-weight:700; border:1px solid #059669; transition:transform .3s; z-index:300; white-space:nowrap; }
.toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<header>
  <div class="header-left">
    <div class="logo">🔑 정답의 벽</div>
    <div class="badge" id="countBadge">0문항</div>
  </div>
  <div class="header-right">
    <label class="upload-label" for="fileInput">📂 엑셀 업로드</label>
    <input type="file" id="fileInput" accept=".xlsx,.xls">
    <div class="timer-box">🔀 <span class="timer-count" id="timerCount">60</span>초</div>
    <button class="btn btn-primary" id="btnShuffle" style="display:none">지금 셔플</button>
    <button class="btn btn-secondary" id="btnToggleTimer" style="display:none">타이머 정지</button>
    <button class="btn btn-share" id="btnShare" style="display:none">🔗 링크 공유</button>
  </div>
</header>

<div id="uploadGuide">
  <div class="icon">🔑</div>
  <h2>엑셀 파일을 업로드하세요</h2>
  <p>정답 텍스트 + 4자리 코드만 표시됩니다<br>1분마다 자동으로 위치가 섞입니다</p>
  <label class="upload-label" for="fileInput" style="font-size:.9rem;padding:10px 24px;margin-top:8px">📂 엑셀 파일 선택</label>
</div>

<div id="wall"><div class="card-grid" id="cardGrid"></div></div>
<div class="progress-bar" id="progressBar" style="width:100%"></div>
<div class="toast" id="toast">🔀 정답 위치가 바뀌었습니다!</div>

<div id="shareOverlay"></div>
<div id="sharePanel">
  <h3>🔗 링크로 공유하기</h3>
  <p>아래 링크를 복사해서 다른 컴퓨터 브라우저에 붙여넣으세요.<br>정답 데이터가 링크 안에 포함되어 있어요.</p>
  <textarea id="shareUrl" readonly></textarea>
  <div class="share-btns">
    <button class="btn btn-primary" id="btnCopyUrl">📋 링크 복사</button>
    <button class="btn btn-secondary" id="btnCloseShare">닫기</button>
  </div>
</div>

<script>
var allQ = [];
var timerInt = null;
var running = false;
var secs = 30;
var INTERVAL = 30;
var AREAS = ["공감력","표현력","업무이해력","협업역량","자기주도력","핵심가치이해력","학사이해력"];

function loadFromUrl() {
  var hash = location.hash;
  if (!hash || hash.length < 2) return false;
  try {
    var json = decodeURIComponent(atob(hash.slice(1)));
    var data = JSON.parse(json);
    if (!Array.isArray(data) || data.length === 0) return false;
    allQ = data;
    document.getElementById("countBadge").textContent = allQ.length + "문항";
    render(false); showWall(); startTimer();
    return true;
  } catch(e) { return false; }
}

function makeShareUrl() {
  return location.href.split("#")[0] + "#" + btoa(encodeURIComponent(JSON.stringify(allQ)));
}

document.getElementById("btnShare").addEventListener("click", function() {
  document.getElementById("shareUrl").value = makeShareUrl();
  document.getElementById("sharePanel").style.display = "block";
  document.getElementById("shareOverlay").style.display = "block";
});
document.getElementById("btnCopyUrl").addEventListener("click", function() {
  var ta = document.getElementById("shareUrl");
  ta.select(); document.execCommand("copy");
  this.textContent = "✅ 복사됨!";
  var btn = this;
  setTimeout(function(){ btn.textContent = "📋 링크 복사"; }, 1500);
});
document.getElementById("btnCloseShare").addEventListener("click", closeShare);
document.getElementById("shareOverlay").addEventListener("click", closeShare);
function closeShare() {
  document.getElementById("sharePanel").style.display = "none";
  document.getElementById("shareOverlay").style.display = "none";
}

document.getElementById("fileInput").addEventListener("change", function(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    var wb = XLSX.read(ev.target.result, {type:"binary"});
    var ws = wb.Sheets[wb.SheetNames[0]];
    var rows = XLSX.utils.sheet_to_json(ws, {header:1});
    allQ = [];
    for (var i = 1; i < rows.length; i++) {
      var r = rows[i];
      if (!r[0] || !r[3]) continue;
      allQ.push({
        code: String(r[2] || ""),
        answer: String(r[3] || ""),
        area: String(r[4] || "")
      });
    }
    document.getElementById("countBadge").textContent = allQ.length + "문항";
    location.hash = btoa(encodeURIComponent(JSON.stringify(allQ)));
    render(false); showWall(); startTimer();
  };
  reader.readAsBinaryString(file);
});

function doShuffle(a) {
  var b = a.slice();
  for (var i = b.length-1; i > 0; i--) {
    var j = Math.floor(Math.random()*(i+1));
    var tmp = b[i]; b[i] = b[j]; b[j] = tmp;
  }
  return b;
}

function calcGrid(n) {
  var W = window.innerWidth - 10;
  var H = window.innerHeight - 44 - 10;
  var bc = 1, bs = 999999;
  for (var c = 1; c <= n; c++) {
    var r = Math.ceil(n/c);
    var s = Math.abs((W/c)/(H/r) - 1.3);
    if (s < bs) { bs = s; bc = c; }
  }
  return {cols:bc, rows:Math.ceil(n/bc)};
}

var mCvs = document.createElement("canvas");
var mCtx = mCvs.getContext("2d");

function bestAnswerSize(lines, maxW, maxH) {
  var face = "Malgun Gothic, Segoe UI, sans-serif";
  for (var sz = 13; sz >= 6; sz -= 0.5) {
    mCtx.font = "800 " + sz + "px " + face;
    var lh = sz * 1.35;
    if (lines.length * lh > maxH * 0.55) continue;
    var ok = true;
    for (var l = 0; l < lines.length; l++) {
      if (mCtx.measureText(lines[l]).width > maxW) { ok = false; break; }
    }
    if (ok) return sz;
  }
  return 6;
}

function bestCodeSize(cardW, cardH) {
  // 코드는 4자리 고정, 카드 너비의 70% 차지하게
  var target = cardW * 0.7;
  var face = "Consolas, monospace";
  for (var sz = 28; sz >= 10; sz--) {
    mCtx.font = "900 " + sz + "px " + face;
    if (mCtx.measureText("0000").width <= target && sz * 1.2 <= cardH * 0.45) return sz;
  }
  return 10;
}

function draw(grid, questions) {
  var n = questions.length;
  var g = calcGrid(n);
  var cols = g.cols, rows = g.rows;
  grid.style.gridTemplateColumns = "repeat("+cols+",1fr)";
  grid.style.gridTemplateRows = "repeat("+rows+",1fr)";
  grid.innerHTML = "";

  var wW = window.innerWidth - 10;
  var wH = window.innerHeight - 44 - 10;
  var cW = Math.floor((wW-(cols-1)*4)/cols);
  var cH = Math.floor((wH-(rows-1)*4)/rows);

  // 가용 영역: bar5 + padding8 + divider3 + gap4 = 20px
  var innerH = cH - 20;
  var innerW = cW - 12;

  var frag = document.createDocumentFragment();
  for (var i = 0; i < questions.length; i++) {
    var q = questions[i];
    var lines = q.answer.split("/").map(function(s){ return s.trim(); });
    var afs = bestAnswerSize(lines, innerW, innerH);
    var cfs = bestCodeSize(cW, cH);
    var ci = AREAS.indexOf(q.area);
    if (ci < 0) ci = 0;

    var card = document.createElement("div");
    card.className = "card appear";
    card.style.animationDelay = Math.min(i*0.006, 0.2) + "s";
    card.innerHTML =
      '<div class="card-bar c'+ci+'"></div>'+
      '<div class="card-inner">'+
        '<div class="card-answer" style="font-size:'+afs+'px">'+lines.join("<br>")+'</div>'+
        '<div class="card-divider"></div>'+
        '<div class="card-code" style="font-size:'+cfs+'px">'+q.code+'</div>'+
      '</div>';
    frag.appendChild(card);
  }
  grid.appendChild(frag);
}

function render(animate) {
  var grid = document.getElementById("cardGrid");
  var sh = doShuffle(allQ);
  if (animate) {
    var cards = document.querySelectorAll(".card");
    for (var i=0;i<cards.length;i++) cards[i].classList.add("shuffling");
    setTimeout(function(){ draw(grid,sh); }, 440);
  } else {
    draw(grid, sh);
  }
}

function showWall() {
  document.getElementById("uploadGuide").style.display = "none";
  document.getElementById("wall").style.display = "block";
  document.getElementById("btnShuffle").style.display = "inline-block";
  document.getElementById("btnToggleTimer").style.display = "inline-block";
  document.getElementById("btnShare").style.display = "inline-block";
}

function startTimer() {
  if (timerInt) clearInterval(timerInt);
  secs = INTERVAL; running = true;
  updUI(); updBar();
  timerInt = setInterval(function(){
    if (!running) return;
    secs--; updUI(); updBar();
    if (secs <= 0) { go(); secs = INTERVAL; }
  }, 1000);
  document.getElementById("btnToggleTimer").textContent = "타이머 정지";
}

function updUI() { document.getElementById("timerCount").textContent = secs; }
function updBar() { document.getElementById("progressBar").style.width = (secs/INTERVAL*100)+"%"; }

function go() {
  render(true);
  var t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(function(){ t.classList.remove("show"); }, 2000);
}

document.getElementById("btnShuffle").addEventListener("click", function(){
  go(); secs = INTERVAL; updBar();
});
document.getElementById("btnToggleTimer").addEventListener("click", function(){
  running = !running;
  this.textContent = running ? "타이머 정지" : "타이머 재개";
  this.className = "btn " + (running ? "btn-secondary" : "btn-danger");
});
window.addEventListener("resize", function(){
  if (allQ.length > 0) render(false);
});
window.addEventListener("load", function(){ loadFromUrl(); });
</script>
</body>
</html>
